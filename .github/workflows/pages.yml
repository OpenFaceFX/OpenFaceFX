name: Deploy demo site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (runtime + docs build tools)
        run: pip install -e ".[docs]"
      - name: Generate demo track from the live pipeline
        run: |
          python -m openfacefx naive \
            --text "hello world this is a test of open face f x" \
            --wav examples/voice.wav -o demo_track.json \
            --emit-segments demo_segments.json
          # Acoustic-adapter demo: rebuilt from a REAL recognizer run. Allosaurus
          # is run once, locally, by tools/build-acoustic-demo.sh to produce the
          # committed examples/speech.allosaurus.txt — its phones + timings, with
          # NO transcript. CI only re-runs the numpy adapter over that file (no ML
          # here), and skips cleanly until the recognizer output is committed.
          if [ -f examples/speech.allosaurus.txt ]; then
            python -m openfacefx naive \
              --anchors examples/speech.allosaurus.txt --anchors-format allosaurus \
              -o acoustic_track.json --emit-segments acoustic_segments.json
          fi
      - name: Build site
        run: |
          mkdir -p site/demo
          # --segments adds the clickable phoneme lane to the live demo. Audio
          # (--wav) is intentionally left off the autoplay demo: browsers block
          # autoplaying sound without a user gesture, which would stall the
          # on-load animation; the lane needs no gesture. Local builds add --wav
          # for synced audio + waveform (see the README preview section).
          python tools/build_preview.py demo_track.json site/demo/index.html \
            --segments demo_segments.json --autoplay
          # Acoustic demo keeps --wav (a play button) — the point is to HEAR the
          # recognizer's phones line up with real speech. Not --autoplay: browsers
          # block autoplaying audio without a user gesture. Built only when the
          # recognizer output above was present.
          if [ -f acoustic_track.json ]; then
            python tools/build_preview.py acoustic_track.json site/acoustic.html \
              --wav examples/speech.wav --segments acoustic_segments.json
          fi
          cp docs/logo.svg site/logo.svg
          cp examples/talking-face-demo.html site/face.html
          # Interactive "try it with your own audio" demo (issue #28): the real
          # numpy-only openfacefx wheel runs in-browser via Pyodide + micropip.
          # Ship the page and the sample voice it offers, and pin it to the latest
          # PUBLISHED release so micropip can always resolve it (main may sit ahead
          # of PyPI). Stamp is non-fatal: if PyPI is unreachable the committed pin
          # stands, which is a valid released version.
          cp examples/try-it.html site/try-it.html
          cp examples/voice.wav site/voice.wav
          # OpenFaceFX Studio — the full web studio (runs client-side via Pyodide).
          mkdir -p site/studio
          cp -r src/openfacefx/studio_web/. site/studio/
          # Pin the in-browser wheel version. Prefer the latest PUBLISHED release
          # (main may sit ahead of PyPI), but NEVER downgrade below the committed
          # source pin: PyPI's JSON API is CDN-cached per-edge and can briefly report
          # an OLDER version right after a release, which would otherwise ship a wheel
          # missing brand-new modules. So pin to max(source, PyPI).
          SRC=$(grep -o 'const OFFX_VERSION = "[^"]*"' site/studio/studio.js | head -1 | sed 's/.*"\(.*\)"/\1/')
          OFFX_PUB=$(python -c "import urllib.request,json;print(json.load(urllib.request.urlopen('https://pypi.org/pypi/openfacefx/json',timeout=15))['info']['version'])" 2>/dev/null || true)
          PIN=$(printf '%s\n%s\n' "$SRC" "$OFFX_PUB" | grep -v '^[[:space:]]*$' | sort -V | tail -1)   # max(source, PyPI) — never downgrade
          if [ -n "$PIN" ]; then
            sed -i "s/const OFFX_VERSION = \"[0-9][0-9A-Za-z.-]*\"/const OFFX_VERSION = \"$PIN\"/" site/try-it.html
            sed -i "s/const OFFX_VERSION = \"[0-9][0-9A-Za-z.-]*\"/const OFFX_VERSION = \"$PIN\"/" site/studio/studio.js
            echo "Pinned in-browser demo + Studio to openfacefx $PIN (source=$SRC pypi=$OFFX_PUB)"
          fi
          # Cache-bust the Studio's own JS/CSS so a fresh deploy is never served
          # stale from the browser cache (GitHub Pages sets max-age=600 on assets;
          # the scripts have no natural version in their URL, so a changed studio.js
          # can be served from cache for up to 10 min — or longer if a client
          # over-caches). Stamping the commit SHA onto the asset URLs makes each
          # build unique, so loading the (short-lived) HTML always pulls fresh code.
          CB="${GITHUB_SHA:0:8}"
          sed -i -E "s#href=\"studio\.css\"#href=\"studio.css?v=$CB\"#; s#src=\"(studio|assistant|account|preview3d)\.js\"#src=\"\1.js?v=$CB\"#g" site/studio/index.html
          echo "Cache-busted Studio assets with $CB"
          # Landing page — the full marketing site (examples/landing.html): animated
          # hero, view cards, runtimes, AI/vault, exporters. Its CTAs point at the
          # sub-pages built above (studio/ demo/ try-it.html acoustic.html docs/).
          cp examples/landing.html site/index.html
          # Never show a dead Acoustic link: drop it if that demo was not built
          # (no committed recognizer output yet — run tools/build-acoustic-demo.sh).
          [ -f site/acoustic.html ] || sed -i '/href="acoustic.html"/d' site/index.html
      - name: Build the docs site into site/docs (MkDocs Material + mkdocstrings)
        # mkdocs only (re)writes the site/docs subdirectory, so the landing page,
        # demo/, logo.svg and quickstart.gif already in site/ are left untouched.
        # --strict fails the build on any broken link, missing nav page, or ref.
        run: mkdocs build --strict --site-dir site/docs
      - name: Render the quickstart GIF from docs/quickstart.tape (VHS)
        # Re-recorded from the committed .tape on every push so it can never
        # drift from the real CLI; openfacefx is already installed above, so the
        # `python -m openfacefx …` line inside the tape runs against this code.
        # Toolchain installed directly with pinned releases — vhs-action@v2.1.0
        # broke on "Failed to install ffmpeg" (its internal dependency setup).
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg
          curl -sL https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64 -o /tmp/ttyd
          sudo install /tmp/ttyd /usr/local/bin/ttyd
          curl -sL https://github.com/charmbracelet/vhs/releases/download/v0.11.0/vhs_0.11.0_amd64.deb -o /tmp/vhs.deb
          sudo dpkg -i /tmp/vhs.deb
          vhs docs/quickstart.tape
      - name: Publish the GIF into the site
        run: cp docs/quickstart.gif site/quickstart.gif
      - name: Write the custom-domain CNAME (openfacefx.com, issue-tracked in memory)
        # Persists the GitHub Pages custom domain across workflow deploys so the
        # site keeps serving on https://openfacefx.com and github.io redirects to it.
        run: echo openfacefx.com > site/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

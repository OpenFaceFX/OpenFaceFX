site_name: OpenFaceFX
site_description: >-
  Open-source lip-sync: voice recording + transcript to viseme animation curves
  for any engine. MIT, numpy-only.
site_url: https://openfacefx.github.io/OpenFaceFX/docs/
site_author: OpenFaceFX contributors
copyright: >-
  MIT-licensed. FaceFX is a registered trademark of OC3 Entertainment; OpenFaceFX
  is an independent project, not affiliated with or endorsed by OC3 Entertainment.

repo_url: https://github.com/OpenFaceFX/OpenFaceFX
repo_name: OpenFaceFX/OpenFaceFX
edit_uri: edit/main/docs/

# Reuse the existing docs/ folder as-is: the COMPATIBILITY / retargeting / timing
# guides already live here and are surfaced in the nav below without being forked.
docs_dir: docs

theme:
  name: material
  logo: logo.svg
  favicon: logo.svg
  icon:
    repo: fontawesome/brands/github
  # Amber-on-dark brand (#f4b942), matching the logo and landing page. Dark is
  # the default; the toggle offers a light scheme. Exact hex is pinned in
  # stylesheets/brand.css (Material's built-in "amber" is a different yellow).
  palette:
    - scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - stylesheets/brand.css

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # src/ layout — point griffe at the sources so the API renders whether
          # or not the package is installed.
          paths: [src]
          options:
            show_root_heading: true
            show_root_full_path: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            # Render every public member, including ones without a docstring
            # (e.g. pipeline.generate_naive) — otherwise they'd be dropped.
            show_if_no_docstring: true
            members_order: source
            show_signature_annotations: true
            signature_crossrefs: false
            docstring_section_style: table
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Guides:
      - Compatibility: COMPATIBILITY.md
      - FaceFXWrapper drop-in: facefxwrapper.md
      - Retargeting: retargeting.md
      - TTS timing ingest: timing.md
  - API Reference:
      - Overview: api/index.md
      - Pipeline & generation: api/pipeline.md
      - Visemes, coarticulation & curves: api/visemes.md
      - Timing & anchors: api/timing.md
      - Retargeting: api/retarget.md
      - Exporters: api/exporters.md
      - Batch & CLI: api/batch.md
  - Changelog: changelog.md
